version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: neet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neet_counselling
      POSTGRES_USER: neet_user
      POSTGRES_PASSWORD: neet_pass_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neet_user -d neet_counselling"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
